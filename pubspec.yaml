name: travel_buddy
description: "Travel Buddy - Team-based travel companion app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_storage: any
  firebase_messaging: any

  # Auth
  google_sign_in: any

  # Maps & Location
  google_maps_flutter: any
  flutter_map: any
  latlong2: any
  geolocator: any

  # UI & Utils
  cached_network_image: any
  image_picker: any
  qr_flutter: any
  share_plus: any
  uuid: any
  shared_preferences: any
  intl: any
  google_fonts: any
  http: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
