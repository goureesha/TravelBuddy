plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

android {
    namespace = "com.travelbuddy.travel_buddy"
    compileSdk = 35
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    signingConfigs {
        ciRelease {
            def keystoreFile = file("travelbuddy-debug.jks")
            if (keystoreFile.exists()) {
                storeFile keystoreFile
                storePassword "travelbuddy123"
                keyAlias "travelbuddy"
                keyPassword "travelbuddy123"
            }
        }
    }

    defaultConfig {
        applicationId = "com.travelbuddy.travel_buddy"
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        multiDexEnabled true
    }

    buildTypes {
        release {
            def ciKeystore = file("travelbuddy-debug.jks")
            if (ciKeystore.exists()) {
                signingConfig = signingConfigs.ciRelease
            } else {
                signingConfig = signingConfigs.debug
            }
            minifyEnabled = true
            shrinkResources = true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}
