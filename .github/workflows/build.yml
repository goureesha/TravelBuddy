name: Build APK & Flutter Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Create signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/travelbuddy-debug.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias travelbuddy \
            -storepass travelbuddy123 \
            -keypass travelbuddy123 \
            -dname "CN=Travel Buddy,OU=Dev,O=TravelBuddy,L=Bangalore,ST=Karnataka,C=IN"

      - name: Print SHA-1 fingerprint
        run: |
          echo "=== SHA-1 FINGERPRINT (add this to Firebase Console) ==="
          keytool -list -v -keystore android/app/travelbuddy-debug.jks -alias travelbuddy -storepass travelbuddy123 | grep SHA1
          echo "========================================================="

      - name: Build Release APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: travel-buddy-apks
          path: build/app/outputs/flutter-apk/app-*-release.apk

  build-web:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href "/TravelBuddy/"

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: travel-buddy-web
          path: build/web

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
