name: Build APK & Flutter Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Show resolved deps
        run: flutter pub deps --no-dev 2>&1 | head -60

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Build Debug APK (verbose)
        run: flutter build apk --debug -v 2>&1 | tail -80
